- name: double_pipe_concat
  category: PRESTO_SYNTAX
  description: "Convert Presto || string concatenation to BigQuery CONCAT — compatible"
  presto_pattern: "([^|])\\|\\|([^|])"
  googlesql_replacement: "\\1||\\2"
  examples:
    - presto_sql: "SELECT first_name || ' ' || last_name"
      googlesql: "SELECT first_name || ' ' || last_name"

- name: subscript_bracket
  category: PRESTO_SYNTAX
  description: "Convert Presto array subscript arr[1] (1-based) to BigQuery arr[OFFSET(0)] (0-based)"
  presto_pattern: "([a-zA-Z_]\\w*)\\[(\\d+)\\]"
  googlesql_replacement: "\\1[OFFSET(\\2 - 1)]"
  examples:
    - presto_sql: "SELECT tags[1]"
      googlesql: "SELECT tags[OFFSET(1 - 1)]"

- name: try_function_cast
  category: PRESTO_SYNTAX
  description: "Convert Presto TRY(CAST(x AS type)) to BigQuery SAFE_CAST(x AS type)"
  presto_pattern: "\\bTRY\\(\\s*CAST\\(\\s*([^)]+?)\\s+AS\\s+(\\w+)\\s*\\)\\s*\\)"
  googlesql_replacement: "SAFE_CAST(\\1 AS \\2)"
  examples:
    - presto_sql: "SELECT TRY(CAST(val AS INTEGER))"
      googlesql: "SELECT SAFE_CAST(val AS INTEGER)"

- name: current_timestamp_no_parens
  category: PRESTO_SYNTAX
  description: "Convert Presto CURRENT_TIMESTAMP (without parens) to BigQuery CURRENT_TIMESTAMP()"
  presto_pattern: "\\bCURRENT_TIMESTAMP\\b(?!\\s*\\()"
  googlesql_replacement: "CURRENT_TIMESTAMP()"
  examples:
    - presto_sql: "SELECT CURRENT_TIMESTAMP"
      googlesql: "SELECT CURRENT_TIMESTAMP()"
