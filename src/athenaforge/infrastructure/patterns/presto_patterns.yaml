# =============================================================================
# Presto/Athena to BigQuery (GoogleSQL) Translation Pattern Library
# 90+ patterns covering common Presto→BigQuery SQL translations
# =============================================================================

# =============================================================================
# MAP_CONSTRUCTOR (2 patterns)
# =============================================================================

- name: map_constructor_to_struct
  category: MAP_CONSTRUCTOR
  description: "Convert Presto MAP(ARRAY[...], ARRAY[...]) constructor to BigQuery STRUCT syntax"
  presto_pattern: "MAP\\(\\s*ARRAY\\[([^\\]]+)\\]\\s*,\\s*ARRAY\\[([^\\]]+)\\]\\s*\\)"
  googlesql_replacement: "STRUCT(\\1, \\2)"
  examples:
    - presto_sql: "SELECT MAP(ARRAY['a', 'b'], ARRAY[1, 2])"
      googlesql: "SELECT STRUCT('a', 'b', 1, 2)"

- name: map_constructor_empty
  category: MAP_CONSTRUCTOR
  description: "Convert Presto empty MAP() constructor to BigQuery STRUCT()"
  presto_pattern: "\\bMAP\\(\\s*\\)"
  googlesql_replacement: "STRUCT()"
  examples:
    - presto_sql: "SELECT MAP()"
      googlesql: "SELECT STRUCT()"

# =============================================================================
# TRANSFORM (2 patterns)
# =============================================================================

- name: transform_array
  category: TRANSFORM
  description: "Convert Presto TRANSFORM(array, lambda) to BigQuery ARRAY(SELECT ... FROM UNNEST(...))"
  presto_pattern: "\\bTRANSFORM\\(\\s*([^,]+)\\s*,\\s*([a-zA-Z_]\\w*)\\s*->\\s*([^)]+)\\)"
  googlesql_replacement: "ARRAY(SELECT \\3 FROM UNNEST(\\1) AS \\2)"
  examples:
    - presto_sql: "SELECT TRANSFORM(arr, x -> x * 2)"
      googlesql: "SELECT ARRAY(SELECT x * 2 FROM UNNEST(arr) AS x)"

- name: transform_nested
  category: TRANSFORM
  description: "Convert Presto TRANSFORM with nested expression to BigQuery equivalent"
  presto_pattern: "\\bTRANSFORM\\(\\s*([^,]+)\\s*,\\s*([a-zA-Z_]\\w*)\\s*->\\s*CAST\\(([^)]+)\\s+AS\\s+([^)]+)\\)\\)"
  googlesql_replacement: "ARRAY(SELECT CAST(\\3 AS \\4) FROM UNNEST(\\1) AS \\2)"
  examples:
    - presto_sql: "SELECT TRANSFORM(ids, x -> CAST(x AS VARCHAR))"
      googlesql: "SELECT ARRAY(SELECT CAST(x AS VARCHAR) FROM UNNEST(ids) AS x)"

# =============================================================================
# FILTER (1 pattern)
# =============================================================================

- name: filter_array
  category: FILTER
  description: "Convert Presto FILTER(array, lambda) to BigQuery ARRAY(SELECT ... FROM UNNEST(...) WHERE ...)"
  presto_pattern: "\\bFILTER\\(\\s*([^,]+)\\s*,\\s*([a-zA-Z_]\\w*)\\s*->\\s*([^)]+)\\)"
  googlesql_replacement: "ARRAY(SELECT \\2 FROM UNNEST(\\1) AS \\2 WHERE \\3)"
  examples:
    - presto_sql: "SELECT FILTER(arr, x -> x > 10)"
      googlesql: "SELECT ARRAY(SELECT x FROM UNNEST(arr) AS x WHERE x > 10)"

# =============================================================================
# DATE_FUNCTIONS (20 patterns)
# =============================================================================

- name: date_trunc
  category: DATE_FUNCTIONS
  description: "Convert Presto DATE_TRUNC('unit', expr) to BigQuery DATE_TRUNC(expr, unit)"
  presto_pattern: "\\bDATE_TRUNC\\(\\s*'(\\w+)'\\s*,\\s*([^)]+)\\)"
  googlesql_replacement: "DATE_TRUNC(\\2, \\1)"
  examples:
    - presto_sql: "SELECT DATE_TRUNC('month', order_date)"
      googlesql: "SELECT DATE_TRUNC(order_date, MONTH)"

- name: date_add
  category: DATE_FUNCTIONS
  description: "Convert Presto DATE_ADD('unit', amount, expr) to BigQuery DATE_ADD(expr, INTERVAL amount unit)"
  presto_pattern: "\\bDATE_ADD\\(\\s*'(\\w+)'\\s*,\\s*(-?\\d+)\\s*,\\s*([^)]+)\\)"
  googlesql_replacement: "DATE_ADD(\\3, INTERVAL \\2 \\1)"
  examples:
    - presto_sql: "SELECT DATE_ADD('day', 7, order_date)"
      googlesql: "SELECT DATE_ADD(order_date, INTERVAL 7 DAY)"

- name: date_diff
  category: DATE_FUNCTIONS
  description: "Convert Presto DATE_DIFF('unit', start, end) to BigQuery DATE_DIFF(end, start, unit)"
  presto_pattern: "\\bDATE_DIFF\\(\\s*'(\\w+)'\\s*,\\s*([^,]+)\\s*,\\s*([^)]+)\\)"
  googlesql_replacement: "DATE_DIFF(\\3, \\2, \\1)"
  examples:
    - presto_sql: "SELECT DATE_DIFF('day', start_date, end_date)"
      googlesql: "SELECT DATE_DIFF(end_date, start_date, DAY)"

- name: date_format
  category: DATE_FUNCTIONS
  description: "Convert Presto DATE_FORMAT(timestamp, format) to BigQuery FORMAT_TIMESTAMP(format, timestamp)"
  presto_pattern: "\\bDATE_FORMAT\\(\\s*([^,]+)\\s*,\\s*([^)]+)\\)"
  googlesql_replacement: "FORMAT_TIMESTAMP(\\2, \\1)"
  examples:
    - presto_sql: "SELECT DATE_FORMAT(created_at, '%Y-%m-%d')"
      googlesql: "SELECT FORMAT_TIMESTAMP('%Y-%m-%d', created_at)"

- name: date_parse
  category: DATE_FUNCTIONS
  description: "Convert Presto DATE_PARSE(string, format) to BigQuery PARSE_TIMESTAMP(format, string)"
  presto_pattern: "\\bDATE_PARSE\\(\\s*([^,]+)\\s*,\\s*([^)]+)\\)"
  googlesql_replacement: "PARSE_TIMESTAMP(\\2, \\1)"
  examples:
    - presto_sql: "SELECT DATE_PARSE(date_str, '%Y-%m-%d %H:%i:%s')"
      googlesql: "SELECT PARSE_TIMESTAMP('%Y-%m-%d %H:%i:%s', date_str)"

- name: from_unixtime
  category: DATE_FUNCTIONS
  description: "Convert Presto FROM_UNIXTIME(epoch) to BigQuery TIMESTAMP_SECONDS(epoch)"
  presto_pattern: "\\bFROM_UNIXTIME\\(\\s*([^)]+)\\)"
  googlesql_replacement: "TIMESTAMP_SECONDS(\\1)"
  examples:
    - presto_sql: "SELECT FROM_UNIXTIME(epoch_col)"
      googlesql: "SELECT TIMESTAMP_SECONDS(epoch_col)"

- name: to_unixtime
  category: DATE_FUNCTIONS
  description: "Convert Presto TO_UNIXTIME(timestamp) to BigQuery UNIX_SECONDS(timestamp)"
  presto_pattern: "\\bTO_UNIXTIME\\(\\s*([^)]+)\\)"
  googlesql_replacement: "UNIX_SECONDS(\\1)"
  examples:
    - presto_sql: "SELECT TO_UNIXTIME(created_at)"
      googlesql: "SELECT UNIX_SECONDS(created_at)"

- name: now_function
  category: DATE_FUNCTIONS
  description: "Convert Presto NOW() to BigQuery CURRENT_TIMESTAMP()"
  presto_pattern: "\\bNOW\\(\\s*\\)"
  googlesql_replacement: "CURRENT_TIMESTAMP()"
  examples:
    - presto_sql: "SELECT NOW()"
      googlesql: "SELECT CURRENT_TIMESTAMP()"

- name: at_timezone
  category: DATE_FUNCTIONS
  description: "Convert Presto AT_TIMEZONE(timestamp, timezone) to BigQuery TIMESTAMP(timestamp, timezone)"
  presto_pattern: "\\bAT_TIMEZONE\\(\\s*([^,]+)\\s*,\\s*([^)]+)\\)"
  googlesql_replacement: "TIMESTAMP(\\1, \\2)"
  examples:
    - presto_sql: "SELECT AT_TIMEZONE(created_at, 'America/New_York')"
      googlesql: "SELECT TIMESTAMP(created_at, 'America/New_York')"

- name: interval_quoted
  category: DATE_FUNCTIONS
  description: "Convert Presto INTERVAL 'n' UNIT (quoted) to BigQuery INTERVAL n UNIT (unquoted)"
  presto_pattern: "\\bINTERVAL\\s+'(\\d+)'\\s+(DAY|HOUR|MINUTE|SECOND|MONTH|YEAR)"
  googlesql_replacement: "INTERVAL \\1 \\2"
  examples:
    - presto_sql: "SELECT created_at + INTERVAL '1' DAY"
      googlesql: "SELECT created_at + INTERVAL 1 DAY"

- name: year_extract
  category: DATE_FUNCTIONS
  description: "Convert Presto YEAR(date) to BigQuery EXTRACT(YEAR FROM date)"
  presto_pattern: "\\bYEAR\\(\\s*([^)]+)\\)"
