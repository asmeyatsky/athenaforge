# =============================================================================

- name: regexp_like
  category: REGEXP_FUNCTIONS
  description: "Convert Presto REGEXP_LIKE(str, pattern) to BigQuery REGEXP_CONTAINS(str, pattern)"
  presto_pattern: "\\bREGEXP_LIKE\\("
  googlesql_replacement: "REGEXP_CONTAINS("
  examples:
    - presto_sql: "SELECT REGEXP_LIKE(name, '^A.*')"
      googlesql: "SELECT REGEXP_CONTAINS(name, '^A.*')"

- name: regexp_extract
  category: REGEXP_FUNCTIONS
  description: "Convert Presto REGEXP_EXTRACT(str, pattern) to BigQuery REGEXP_EXTRACT(str, pattern)"
  presto_pattern: "\\bREGEXP_EXTRACT\\(\\s*([^,]+)\\s*,\\s*([^)]+)\\)"
  googlesql_replacement: "REGEXP_EXTRACT(\\1, \\2)"
  examples:
    - presto_sql: "SELECT REGEXP_EXTRACT(url, '://([^/]+)')"
      googlesql: "SELECT REGEXP_EXTRACT(url, '://([^/]+)')"

- name: regexp_extract_all
  category: REGEXP_FUNCTIONS
  description: "Convert Presto REGEXP_EXTRACT_ALL(str, pattern) to BigQuery REGEXP_EXTRACT_ALL(str, pattern)"
  presto_pattern: "\\bREGEXP_EXTRACT_ALL\\(\\s*([^,]+)\\s*,\\s*([^)]+)\\)"
  googlesql_replacement: "REGEXP_EXTRACT_ALL(\\1, \\2)"
  examples:
    - presto_sql: "SELECT REGEXP_EXTRACT_ALL(text, '\\d+')"
      googlesql: "SELECT REGEXP_EXTRACT_ALL(text, '\\d+')"

- name: regexp_replace
  category: REGEXP_FUNCTIONS
  description: "Convert Presto REGEXP_REPLACE(str, pattern, replacement) to BigQuery REGEXP_REPLACE (note: Java regex to RE2)"
  presto_pattern: "\\bREGEXP_REPLACE\\(\\s*([^,]+)\\s*,\\s*([^,]+)\\s*,\\s*([^)]+)\\)"
  googlesql_replacement: "REGEXP_REPLACE(\\1, \\2, \\3)"
  examples:
    - presto_sql: "SELECT REGEXP_REPLACE(phone, '[^0-9]', '')"
      googlesql: "SELECT REGEXP_REPLACE(phone, '[^0-9]', '')"

- name: regexp_count
  category: REGEXP_FUNCTIONS
  description: "Convert Presto REGEXP_COUNT(str, pattern) to BigQuery ARRAY_LENGTH(REGEXP_EXTRACT_ALL(str, pattern))"
  presto_pattern: "\\bREGEXP_COUNT\\(\\s*([^,]+)\\s*,\\s*([^)]+)\\)"
  googlesql_replacement: "ARRAY_LENGTH(REGEXP_EXTRACT_ALL(\\1, \\2))"
  examples:
    - presto_sql: "SELECT REGEXP_COUNT(text, '\\bthe\\b')"
      googlesql: "SELECT ARRAY_LENGTH(REGEXP_EXTRACT_ALL(text, '\\bthe\\b'))"

